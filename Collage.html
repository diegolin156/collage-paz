<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Collage sin espacios</title>

<style>

body{
font-family:Arial;
background:#f3f4f6;
padding:30px;
margin:0;
}

.panel{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input,button{
padding:8px;
margin:5px;
}

button{
background:#2563eb;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

#collage{
background:white;
border:2px dashed #bbb;
position:relative;
}

img{
position:absolute;
border-radius:4px;
cursor:move;
}

</style>
</head>

<body>

<h2>Creador de Collage</h2>

<div class="panel">

Ancho
<input type="number" id="width" value="1200">

Alto
<input type="number" id="height" value="800">

<button onclick="crearLienzo()">Crear lienzo</button>

<br><br>

<input type="file" id="upload" multiple accept="image/*">

<br><br>

<button onclick="descargar()">Descargar</button>

</div>

<div id="collage"></div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

const collage = document.getElementById("collage")
const uploader = document.getElementById("upload")

let imagenes = []

function crearLienzo(){

let w = document.getElementById("width").value
let h = document.getElementById("height").value

collage.style.width = w+"px"
collage.style.height = h+"px"

}

uploader.addEventListener("change",function(){

let files = Array.from(this.files)

if(files.length>100){
alert("Máximo 100 fotos")
return
}

files.forEach(file=>{

let reader = new FileReader()

reader.onload = function(e){

let img = new Image()

img.onload = function(){

imagenes.push(img)
layout()

}

img.src = e.target.result

}

reader.readAsDataURL(file)

})

})

function layout(){

collage.innerHTML=""

let ancho = collage.clientWidth
let y = 0

let fila = []
let ratioFila = 0
let alturaObjetivo = 180

imagenes.forEach((img,i)=>{

let ratio = img.width/img.height

fila.push(img)
ratioFila += ratio

let anchoFila = ratioFila * alturaObjetivo

if(anchoFila >= ancho){

let escala = ancho / anchoFila
let x = 0

fila.forEach(im=>{

let r = im.width/im.height
let w = r * alturaObjetivo * escala
let h = alturaObjetivo * escala

let el = document.createElement("img")

el.src = im.src
el.style.width = w+"px"
el.style.left = x+"px"
el.style.top = y+"px"

hacerMovible(el)

collage.appendChild(el)

x += w

})

y += alturaObjetivo * escala

fila=[]
ratioFila=0

}

})

}

function hacerMovible(el){

let offsetX,offsetY

el.addEventListener("mousedown",function(e){

offsetX=e.offsetX
offsetY=e.offsetY

function mover(ev){

el.style.left=(ev.pageX-collage.offsetLeft-offsetX)+"px"
el.style.top=(ev.pageY-collage.offsetTop-offsetY)+"px"

}

document.addEventListener("mousemove",mover)

document.addEventListener("mouseup",function(){
document.removeEventListener("mousemove",mover)
},{once:true})

})

}

function descargar(){

html2canvas(collage).then(canvas=>{

let link=document.createElement("a")
link.download="collage.png"
link.href=canvas.toDataURL()
link.click()

})

}

</script>

</body>
</html>
